baseURL = 'https://www.youtao.website/'
locale = 'zh-cn'
title = 'My Blog'
theme = 'PaperMod'

[params]
  author = 'Your Name'
  description = '一个使用 Hugo + PaperMod 的个人博客'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = 'About Me'
  Content = '欢迎来到YouTao的个人博客！我在这里分享技术文章、学习笔记和生活感悟。'

[params.favicon]
  small = '/favicon.ico'
  large = '/favicon.ico'

[[params.social]]
  github = 'realTravisYou'

[params.assets]
  favicon = '/favicon.ico'

[params.fingerprint]
  anchor = 'auto'

[params.analytics]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "JSON"]
